<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沃尔玛商品贴换标加工转换工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/jsuites@4.3.0/dist/jsuites.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4.3.0/dist/jsuites.min.css" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/jspreadsheet.min.css" type="text/css" />

    <style>
        .jexcel > thead > tr > td { font-weight: bold; background-color: #f3f4f6; color: #374151; }
        .jexcel_content { box-shadow: none; border: 1px solid #e5e7eb; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">沃尔玛商品贴换标加工转换工具</h1>

    <div class="mb-8 p-4 border border-blue-200 bg-blue-50 rounded-md">
        <h2 class="text-lg font-semibold mb-3 text-blue-800">第一步：上传《在库库存明细表》</h2>
        <input type="file" id="inventoryFile" accept=".xlsx, .xls, .csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"/>
        <p class="text-xs text-gray-500 mt-2">系统自动筛选：库存主体=深圳市德拉姆供应链有限公司，仓库名称=DLM供应链沃尔玛深圳仓-SZ，且可用库存>0。</p>
    </div>

    <div class="mb-8 p-4 border border-gray-200 rounded-md">
        <div class="flex justify-between items-center mb-3">
            <div>
                <h2 class="text-lg font-semibold text-gray-800 inline-block">第二步：录入转换需求</h2>
                <span class="text-xs text-green-600 ml-2 font-bold">💡 支持类似 Excel 的操作：框选多列粘贴、任意单元格修改、鼠标右键可“批量删除选中行”。</span>
            </div>
            <button onclick="reqTable.insertRow()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 px-4 py-2 rounded text-sm font-medium transition">+ 新增空行</button>
        </div>
        
        <div id="spreadsheet" class="w-full"></div>
    </div>

    <div class="text-center">
        <button onclick="processData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold text-lg shadow-lg transition">执行匹配并导出转换表</button>
    </div>

    <div id="resultArea" class="mt-6 hidden">
        <h3 class="text-lg font-semibold mb-2">执行结果界面预览：</h3>
        <ul id="summaryList" class="text-sm space-y-1 bg-gray-100 p-4 rounded-md shadow-inner max-h-64 overflow-y-auto"></ul>
    </div>
</div>

<script>
    let inventoryData = [];
    let reqTable = null; 

    // 初始化电子表格组件
    document.addEventListener("DOMContentLoaded", function() {
        let initialData = Array.from({length: 10}, () => ['', '', '', '']);
        
        reqTable = jspreadsheet(document.getElementById('spreadsheet'), {
            data: initialData,
            columns: [
                { type: 'text', title: 'SKU (必填)', width: 220 },
                { type: 'text', title: '目标 FNSKU (必填)', width: 220 },
                { type: 'numeric', title: '需求数量 (必填)', width: 150 },
                { type: 'text', title: '备注 (选填)', width: 200 },
            ],
            minDimensions: [4, 5],
            allowInsertRow: true,
            allowManualInsertRow: true,
            allowInsertColumn: false,
            allowDeleteRow: true,
            allowDeleteColumn: false,
            wordWrap: true,
            text: {
                insertANewRowBefore: '在上方插入行',
                insertANewRowAfter: '在下方插入行',
                deleteSelectedRows: '❌ 删除选中的行',
                copy: '复制',
                paste: '粘贴',
            }
        });
    });

    // 读取库存表
    document.getElementById('inventoryFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            inventoryData = XLSX.utils.sheet_to_json(firstSheet);
            alert(`✅ 成功读取库存表，共加载 ${inventoryData.length} 行数据。`);
        };
        reader.readAsArrayBuffer(file);
    });

    // 核心瀑布流匹配逻辑
    function processData() {
        if (inventoryData.length === 0) {
            alert("⚠️ 请先上传《在库库存明细表》！");
            return;
        }

        const dataRows = reqTable.getData();
        let requirements = [];

        dataRows.forEach(row => {
            const sku = row[0] ? String(row[0]).trim() : '';
            const fnsku = row[1] ? String(row[1]).trim() : '';
            const qty = parseInt(row[2]);
            const note = row[3] ? String(row[3]).trim() : ''; 
            
            if (sku && fnsku && qty > 0) {
                requirements.push({ sku, targetFnsku: fnsku, qty, note });
            }
        });

        if (requirements.length === 0) {
            alert("⚠️ 请正确填写至少一条完整需求（SKU、FNSKU、数量必填且数量需大于0）！");
            return;
        }

        let validPool = inventoryData.filter(row => 
            row['库存主体'] === '深圳市德拉姆供应链有限公司' &&
            row['仓库名称'] === 'DLM供应链沃尔玛深圳仓-SZ' &&
            Number(row['可用库存']) > 0
        );

        let outputExcelData = []; // 用于存放 Sheet1 的正常数据
        let unfulfilledData = []; // 用于存放 Sheet2 的异常缺货数据
        let summaryMsg = [];

        requirements.forEach(req => {
            let remainQty = req.qty;
            let currentFulfilled = 0;

            let skuInventory = validPool.filter(r => r['SKU'] === req.sku);
            
            skuInventory.sort((a, b) => {
                if (a['FnSKU'] === req.targetFnsku && b['FnSKU'] !== req.targetFnsku) return -1;
                if (a['FnSKU'] !== req.targetFnsku && b['FnSKU'] === req.targetFnsku) return 1;
                return 0;
            });

            for (let i = 0; i < skuInventory.length; i++) {
                if (remainQty <= 0) break;

                let item = skuInventory[i];
                let itemAvail = Number(item['可用库存']);
                if (itemAvail <= 0) continue;

                let deductQty = Math.min(remainQty, itemAvail);
                remainQty -= deductQty;
                currentFulfilled += deductQty;
                item['可用库存'] -= deductQty; 

                if (item['FnSKU'] !== req.targetFnsku) {
                    outputExcelData.push({
                        '转换类型': '贴换标',
                        '法人主体': '深圳市德拉姆供应链有限公司',
                        '仓库': 'DLM供应链沃尔玛深圳仓-SZ',
                        'SKU1': req.sku,
                        '库区1': '成品-存储1区',
                        'FNSKU1': item['FnSKU'], 
                        '数量': deductQty,
                        'SKU2': req.sku,
                        'FNSKU2': req.targetFnsku
                    });
                }
            }

            // ⚠️ 如果库存跑完了，仍然有缺口（remainQty > 0），则将其推入 Sheet2 数组
            if (remainQty > 0) {
                unfulfilledData.push({
                    '转换类型': '贴换标',
                    '法人主体': '深圳市德拉姆供应链有限公司',
                    '仓库': 'DLM供应链沃尔玛深圳仓-SZ',
                    'SKU1': req.sku,
                    '库区1': '成品-存储1区',
                    'FNSKU1': '', // 缺货状态下，没有具体的源 FNSKU 可供扣减
                    '数量': remainQty, // 这里记录的是缺口的数量
                    'SKU2': req.sku,
                    'FNSKU2': req.targetFnsku,
                    '备注': `不满足，总需${req.qty}，只有${currentFulfilled}，缺${remainQty}`
                });
            }

            let statusMark = remainQty === 0 
                ? '✅ 满足' 
                : `❌ 不满足，只有${currentFulfilled}，缺${remainQty}`;

            summaryMsg.push(`需求 SKU: <span class="font-mono text-blue-700">${req.sku}</span> | 需 ${req.qty} 个 -> <strong>${statusMark}</strong>`);
        });

        const resultArea = document.getElementById('resultArea');
        const summaryList = document.getElementById('summaryList');
        resultArea.classList.remove('hidden');
        summaryList.innerHTML = summaryMsg.map(msg => `<li class="border-b border-gray-200 py-2 text-gray-700">${msg}</li>`).join('');

        exportToExcel(outputExcelData, unfulfilledData);
    }

    // 导出双 Sheet 格式的 Excel
    function exportToExcel(dataRows, unfulfilledRows) {
        if(dataRows.length === 0 && unfulfilledRows.length === 0) {
            alert("匹配完成！所有满足条件的库存 FnSKU 均与目标一致，无需贴标且无缺货，未生成单据。");
            return;
        }

        const workbook = XLSX.utils.book_new();

        // ========== Sheet 1: 正常转换单 (9列) ==========
        // 即使为空也生成一个空表头，以防所有库存都缺货时导致报错
        const headerInfo1 = [
            ['第一行是注释'],
            ['转换类型', '法人主体', '仓库', 'SKU1', '库区1', 'FNSKU1', '数量', 'SKU2', 'FNSKU2']
        ];
        let finalSheetData1 = headerInfo1;
        
        if (dataRows.length > 0) {
            const bodyRows1 = dataRows.map(row => [
                row['转换类型'], row['法人主体'], row['仓库'], row['SKU1'], row['库区1'], 
                row['FNSKU1'], row['数量'], row['SKU2'], row['FNSKU2']
            ]);
            finalSheetData1 = headerInfo1.concat(bodyRows1);
        }
        
        const worksheet1 = XLSX.utils.aoa_to_sheet(finalSheetData1);
        worksheet1['!cols'] = Array(9).fill({ wch: 18 });
        XLSX.utils.book_append_sheet(workbook, worksheet1, "转换单");


        // ========== Sheet 2: 库存异常单 (10列，增加备注) ==========
        if (unfulfilledRows.length > 0) {
            const headerInfo2 = [
                ['第一行是注释'],
                ['转换类型', '法人主体', '仓库', 'SKU1', '库区1', 'FNSKU1', '数量', 'SKU2', 'FNSKU2', '备注']
            ];
            
            const bodyRows2 = unfulfilledRows.map(row => [
                row['转换类型'], row['法人主体'], row['仓库'], row['SKU1'], row['库区1'], 
                row['FNSKU1'], row['数量'], row['SKU2'], row['FNSKU2'], row['备注']
            ]);
            
            const finalSheetData2 = headerInfo2.concat(bodyRows2);
            const worksheet2 = XLSX.utils.aoa_to_sheet(finalSheetData2);
            worksheet2['!cols'] = Array(10).fill({ wch: 18 });
            // 将最后一列“备注”调宽一点，方便看文字
            worksheet2['!cols'][9] = { wch: 40 }; 
            
            XLSX.utils.book_append_sheet(workbook, worksheet2, "库存异常(缺货)");
        }

        XLSX.writeFile(workbook, `贴换标转换单_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
