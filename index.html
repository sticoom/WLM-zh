<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沃尔玛商品贴换标加工转换工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 优化输入框的选中状态，看起来更像 Excel */
        input:focus { outline: 2px solid #3b82f6; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">沃尔玛商品贴换标加工转换工具</h1>

    <div class="mb-8 p-4 border border-blue-200 bg-blue-50 rounded-md">
        <h2 class="text-lg font-semibold mb-3 text-blue-800">第一步：上传《在库库存明细表》</h2>
        <input type="file" id="inventoryFile" accept=".xlsx, .xls, .csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"/>
        <p class="text-xs text-gray-500 mt-2">系统自动筛选：库存主体=深圳市德拉姆供应链有限公司，仓库名称=DLM供应链沃尔玛深圳仓-SZ，且可用库存>0。</p>
    </div>

    <div class="mb-8 p-4 border border-gray-200 rounded-md">
        <div class="flex justify-between items-center mb-3">
            <div>
                <h2 class="text-lg font-semibold text-gray-800 inline-block">第二步：录入转换需求</h2>
                <span class="text-xs text-gray-500 ml-2">💡 提示：可直接在此表格任意输入框内按 <kbd class="bg-gray-100 px-1 border rounded">Ctrl+V</kbd> 粘贴 Excel 多行数据</span>
            </div>
            <button onclick="addRow()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 px-4 py-2 rounded text-sm font-medium transition">+ 手动加一行</button>
        </div>
        
        <table class="w-full text-left border-collapse" id="reqTable">
            <thead>
                <tr class="bg-gray-100 text-gray-700 text-sm">
                    <th class="p-2 border">SKU (必填)</th>
                    <th class="p-2 border">目标 FNSKU (必填)</th>
                    <th class="p-2 border">需求数量 (必填)</th>
                    <th class="p-2 border">备注 (选填)</th>
                    <th class="p-2 border w-16 text-center">操作</th>
                </tr>
            </thead>
            <tbody id="reqBody">
                <tr>
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-sku" placeholder="输入或粘贴"></td>
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-fnsku" placeholder="输入或粘贴"></td>
                    <td class="p-0 border"><input type="number" class="w-full p-2 border-0 req-qty" placeholder="输入数量" min="1"></td>
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-note" placeholder="选填"></td>
                    <td class="p-2 border text-center"><button onclick="removeRow(this)" class="text-red-500 hover:text-red-700 font-bold">删除</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="text-center">
        <button onclick="processData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold text-lg shadow-lg transition">执行匹配并导出转换表</button>
    </div>

    <div id="resultArea" class="mt-6 hidden">
        <h3 class="text-lg font-semibold mb-2">执行结果预览：</h3>
        <ul id="summaryList" class="text-sm space-y-1 bg-gray-100 p-4 rounded-md shadow-inner max-h-64 overflow-y-auto"></ul>
    </div>
</div>

<script>
    let inventoryData = [];

    // 1. 读取库存表
    document.getElementById('inventoryFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            inventoryData = XLSX.utils.sheet_to_json(firstSheet);
            alert(`✅ 成功读取库存表，共加载 ${inventoryData.length} 行数据。`);
        };
        reader.readAsArrayBuffer(file);
    });

    // 2. 核心交互：监听表格内的 Ctrl+V 粘贴事件，实现自动扩展行
    document.getElementById('reqBody').addEventListener('paste', function(e) {
        // 阻止默认的只粘贴到一个输入框里的行为
        e.preventDefault(); 
        
        let pasteData = (e.clipboardData || window.clipboardData).getData('text');
        if (!pasteData) return;

        let rows = pasteData.split(/\r?\n/); 
        const tbody = document.getElementById('reqBody');
        
        // 如果当前表格只有一行且是空的，则在粘贴时先清空它
        if (tbody.children.length === 1) {
            let firstRowInputs = tbody.querySelectorAll('input');
            let isEmpty = Array.from(firstRowInputs).every(input => input.value.trim() === '');
            if (isEmpty) tbody.innerHTML = '';
        }

        // 遍历剪贴板每一行生成输入框
        rows.forEach(row => {
            if (!row.trim()) return; 
            
            const cols = row.split('\t'); 
            const sku = cols[0] ? cols[0].trim() : '';
            const fnsku = cols[1] ? cols[1].trim() : '';
            const qty = cols[2] ? cols[2].trim() : '';
            const note = cols[3] ? cols[3].trim() : '';

            // 只要有有效数据就生成新行
            if (sku || fnsku) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-sku" value="${sku}" placeholder="输入或粘贴"></td>
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-fnsku" value="${fnsku}" placeholder="输入或粘贴"></td>
                    <td class="p-0 border"><input type="number" class="w-full p-2 border-0 req-qty" value="${qty}" placeholder="输入数量" min="1"></td>
                    <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-note" value="${note}" placeholder="选填"></td>
                    <td class="p-2 border text-center"><button onclick="removeRow(this)" class="text-red-500 hover:text-red-700 font-bold">删除</button></td>
                `;
                tbody.appendChild(tr);
            }
        });
    });

    // 3. 手动增删行
    function addRow() {
        const tbody = document.getElementById('reqBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-sku" placeholder="输入或粘贴"></td>
            <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-fnsku" placeholder="输入或粘贴"></td>
            <td class="p-0 border"><input type="number" class="w-full p-2 border-0 req-qty" placeholder="输入数量" min="1"></td>
            <td class="p-0 border"><input type="text" class="w-full p-2 border-0 req-note" placeholder="选填"></td>
            <td class="p-2 border text-center"><button onclick="removeRow(this)" class="text-red-500 hover:text-red-700 font-bold">删除</button></td>
        `;
        tbody.appendChild(tr);
    }

    function removeRow(btn) {
        const row = btn.parentNode.parentNode;
        if (document.getElementById('reqBody').children.length > 1) {
            row.parentNode.removeChild(row);
        } else {
            // 如果是最后一行，直接清空输入框而不是删除 dom
            row.querySelectorAll('input').forEach(input => input.value = '');
        }
    }

    // 4. 瀑布流匹配逻辑
    function processData() {
        if (inventoryData.length === 0) {
            alert("⚠️ 请先上传《在库库存明细表》！");
            return;
        }

        const reqRows = document.querySelectorAll('#reqBody tr');
        let requirements = [];
        reqRows.forEach(row => {
            const sku = row.querySelector('.req-sku').value.trim();
            const fnsku = row.querySelector('.req-fnsku').value.trim();
            const qty = parseInt(row.querySelector('.req-qty').value);
            const note = row.querySelector('.req-note').value.trim();
            if (sku && fnsku && qty > 0) {
                requirements.push({ sku, targetFnsku: fnsku, qty, note });
            }
        });

        if (requirements.length === 0) {
            alert("⚠️ 请正确填写至少一条完整需求（SKU、FNSKU、数量必填且数量需大于0）！");
            return;
        }

        // 筛选有效库存池
        let validPool = inventoryData.filter(row => 
            row['库存主体'] === '深圳市德拉姆供应链有限公司' &&
            row['仓库名称'] === 'DLM供应链沃尔玛深圳仓-SZ' &&
            Number(row['可用库存']) > 0
        );

        let outputExcelData = [];
        let summaryMsg = [];

        requirements.forEach(req => {
            let remainQty = req.qty;
            let currentFulfilled = 0;
            let rowResults = [];

            let skuInventory = validPool.filter(r => r['SKU'] === req.sku);
            
            // 优先级排序：FnSKU 一致的排在最前面
            skuInventory.sort((a, b) => {
                if (a['FnSKU'] === req.targetFnsku && b['FnSKU'] !== req.targetFnsku) return -1;
                if (a['FnSKU'] !== req.targetFnsku && b['FnSKU'] === req.targetFnsku) return 1;
                return 0;
            });

            for (let i = 0; i < skuInventory.length; i++) {
                if (remainQty <= 0) break;

                let item = skuInventory[i];
                let itemAvail = Number(item['可用库存']);
                if (itemAvail <= 0) continue;

                let deductQty = Math.min(remainQty, itemAvail);
                remainQty -= deductQty;
                currentFulfilled += deductQty;
                item['可用库存'] -= deductQty; // 更新内存中的库存池

                // 核心：仅当原始 FnSKU 不等于目标 FNSKU 时，才需要生成换标记录
                if (item['FnSKU'] !== req.targetFnsku) {
                    rowResults.push({
                        '转换类型': '贴换标',
                        '法人主体': '深圳市德拉姆供应链有限公司',
                        '仓库': 'DLM供应链沃尔玛深圳仓-SZ',
                        'SKU1': req.sku,
                        '库区1': '成品-存储1区',
                        'FNSKU1': item['FnSKU'], 
                        '数量': deductQty,
                        'SKU2': req.sku,
                        'FNSKU2': req.targetFnsku,
                        '备注': req.note
                    });
                }
            }

            let statusMark = remainQty === 0 
                ? '✅ 满足' 
                : `❌ 不满足，只有${currentFulfilled}，缺${req.qty - currentFulfilled}`;

            rowResults.forEach(row => {
                row['状态'] = statusMark;
                outputExcelData.push(row);
            });

            summaryMsg.push(`需求 SKU: <span class="font-mono">${req.sku}</span> | 需 ${req.qty} 个 -> <strong>${statusMark}</strong>`);
        });

        const resultArea = document.getElementById('resultArea');
        const summaryList = document.getElementById('summaryList');
        resultArea.classList.remove('hidden');
        summaryList.innerHTML = summaryMsg.map(msg => `<li class="border-b py-2 text-gray-700">${msg}</li>`).join('');

        exportToExcel(outputExcelData);
    }

    // 5. 导出 Excel（根据图 2 结构更新表头）
    function exportToExcel(dataRows) {
        if(dataRows.length === 0) {
            alert("匹配完成！所有满足条件的库存 FnSKU 均与目标一致，物理上无需贴标换标，未生成单据。");
            return;
        }

        // 第1行是注释，第2行是字段标题
        const headerInfo = [
            ['第一行是注释'],
            ['转换类型', '法人主体', '仓库', 'SKU1', '库区1', 'FNSKU1', '数量', 'SKU2', 'FNSKU2', '备注', '状态']
        ];

        const bodyRows = dataRows.map(row => [
            row['转换类型'], row['法人主体'], row['仓库'], row['SKU1'], row['库区1'], 
            row['FNSKU1'], row['数量'], row['SKU2'], row['FNSKU2'], row['备注'], row['状态']
        ]);

        const finalSheetData = headerInfo.concat(bodyRows);
        const worksheet = XLSX.utils.aoa_to_sheet(finalSheetData);
        
        worksheet['!cols'] = Array(11).fill({ wch: 18 });

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "转换单");
        
        XLSX.writeFile(workbook, `贴换标转换单_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
